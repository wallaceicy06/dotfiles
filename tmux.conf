# change leader key
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Dedicated command (run via `prefix :` then type `new-workspace`): prompts for
# a name, then builds a split window -- top runs `cw <name>` (Claude in a new
# worktree), bottom cd's into that worktree once Claude creates it.
set -s command-alias[100] "new-workspace=command-prompt -p 'workspace name:' 'run-shell \"$HOME/.local/bin/new-workspace %1\"'"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# set terminal to 256 colors
set -g default-terminal "screen-256color"

# allow mouse for scrolling
set-option -g mouse on

# vi-bindings
set -g mode-keys vi

bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-selection

set -g status-left-length 50

# Style for inactive windows
setw -g window-status-style fg=default,bg=default
setw -g window-status-format " #I: #W "

# Style for the active window
setw -g window-status-current-style fg=white,bg=black,bold
setw -g window-status-current-format " #I: #W "

# bind -t vi-copy y copy-pipe 'xclip -in -selection clipboard'

# list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-yank'
set -g @plugin 'tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
